name: Build & release mod

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to release as (e.g. v1.1.0.0) — the release creates the tag. Leave empty to just build the zip as a workflow artifact.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate modDesc.xml
        # python3 is preinstalled on GitHub runners; xmllint is not.
        run: python3 -c "import xml.etree.ElementTree as ET; ET.parse('mod/modDesc.xml'); print('modDesc.xml is well-formed')"

      - name: Build mod zip (modDesc.xml at zip root)
        # GIANTS requires modDesc.xml at the root of the zip, and the zip
        # filename is the mod ID — never add a version suffix to it.
        run: |
          cd mod
          zip -r -X ../FS25_MichalsInGameMods.zip . -x '*.DS_Store' -x '*Thumbs.db'
          cd ..
          unzip -l FS25_MichalsInGameMods.zip
          unzip -p FS25_MichalsInGameMods.zip modDesc.xml > /dev/null

      - name: Check tag matches modDesc version
        if: steps.rel.outputs.tag != ''
        run: |
          MODDESC_VERSION=$(sed -n 's:.*<version>\(.*\)</version>.*:\1:p' mod/modDesc.xml)
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$MODDESC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${RELEASE_TAG} does not match modDesc.xml version ${MODDESC_VERSION} — bump <version> or retag."
            exit 1
          fi
        env:
          RELEASE_TAG: ${{ steps.rel.outputs.tag }}

      - name: Publish release with zip asset
        if: steps.rel.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: FS25_MichalsInGameMods.zip
          generate_release_notes: true

      - name: Upload zip as workflow artifact (build-only runs)
        if: steps.rel.outputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: FS25_MichalsInGameMods
          path: FS25_MichalsInGameMods.zip
