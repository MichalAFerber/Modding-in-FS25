name: Build & release mod

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate modDesc.xml
        run: xmllint --noout mod/modDesc.xml

      - name: Build mod zip (modDesc.xml at zip root)
        # GIANTS requires modDesc.xml at the root of the zip, and the zip
        # filename is the mod ID — never add a version suffix to it.
        run: |
          cd mod
          zip -r -X ../FS25_MichalsInGameMods.zip . -x '*.DS_Store' -x '*Thumbs.db'
          cd ..
          unzip -l FS25_MichalsInGameMods.zip
          unzip -p FS25_MichalsInGameMods.zip modDesc.xml > /dev/null

      - name: Check tag matches modDesc version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          MODDESC_VERSION=$(sed -n 's:.*<version>\(.*\)</version>.*:\1:p' mod/modDesc.xml)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MODDESC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match modDesc.xml version ${MODDESC_VERSION} — bump <version> or retag."
            exit 1
          fi

      - name: Publish release with zip asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FS25_MichalsInGameMods.zip
          generate_release_notes: true

      - name: Upload zip as workflow artifact (non-tag runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: FS25_MichalsInGameMods
          path: FS25_MichalsInGameMods.zip
